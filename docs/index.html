<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HJ - Flutter Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<style>
  #main h2 {
    font-size: 1.4rem; /* Ukuran bawaan biasanya sekitar 1.75rem - 2rem */
    margin-top: 1.5rem; /* Mengatur jarak dengan konten di atasnya agar proporsional */
    margin-bottom: 0.5rem;
    color: #ffa500;
  }
</style>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: false,
      maxLevel: 3,                 // Docsify akan mengambil Heading H1 (#), H2 (##), dan H3 (###) dari README.md untuk jadi menu
      sidebarDisplayLevel: 3,
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-dart.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
